name: Production Gate (P1)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'apps/gateway/**'
      - 'packages/**'
      - '.github/workflows/web-prod-gate.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'apps/gateway/**'
      - 'packages/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Gateway uses `env("DATABASE_URL")`. Prisma resolves a relative `file:`
      # URL against the schema directory while @libsql/client resolves it
      # against the process CWD, so an absolute path is required for db:push
      # and the ledger verify step to hit the same SQLite file.
      DATABASE_URL: file:${{ github.workspace }}/apps/gateway/prisma/dev.db
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # --- packages/core (ledger engine) ---
      - name: Generate Prisma client (root schema, used by packages/core)
        run: bun x prisma generate

      - name: Core / Typecheck
        run: cd packages/core && bun run typecheck

      - name: Core / Lint
        run: cd packages/core && bun run lint

      - name: Core / Unit Tests (Vitest)
        run: cd packages/core && bun run test

      # --- apps/web ---
      - name: Web / Lint
        run: cd apps/web && bun run lint

      - name: Web / Typecheck
        run: cd apps/web && bunx tsc --noEmit

      - name: Web / Unit Tests (Vitest)
        run: cd apps/web && bun test --run

      - name: Install Playwright Browsers
        run: cd apps/web && bunx playwright install --with-deps

      - name: E2E Tests (Playwright)
        run: cd apps/web && bunx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      # --- apps/gateway ledger verify (final gate) ---
      - name: Generate Prisma client (gateway)
        run: cd apps/gateway && bun run generate

      - name: Gateway / Provision sqlite schema
        run: cd apps/gateway && bun run db:push

      - name: Gateway / Ledger verify
        run: cd apps/gateway && bun run verify
